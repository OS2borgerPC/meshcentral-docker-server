services:
  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - meshnet
    volumes:
      - meshcentral-data:/opt/meshcentral/meshcentral-data
      - ./config.json:/opt/meshcentral/meshcentral-data/config.json
      - ./plugins:/opt/meshcentral/meshcentral-data/plugins
      - meshcentral-files:/opt/meshcentral/meshcentral-files
      - meshcentral-web:/opt/meshcentral/meshcentral-web
      - meshcentral-backups:/opt/meshcentral/meshcentral-backups
    expose:
      - "443"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:443/health.ashx"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - meshcentral
    environment:
      - HOSTNAME=${HOSTNAME}
    networks:
      - meshnet
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

networks:
  meshnet:
    driver: bridge

volumes:
  meshcentral-data:
  meshcentral-files:
  meshcentral-web:
  meshcentral-backups:
  caddy-data:
  caddy-config:
